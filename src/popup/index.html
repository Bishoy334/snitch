<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Privacy Inspector</title>
    <style>
      :root {
        --bg: #ffffff;
        --ink: #1b1e22;
        --muted: #6b7280;
        --hair: #ebebeb;
        --chipbg: #f3f4f6;
        --track: #c03535;
        --bad: #cf4141; --warn: #d99114; --ok: #2e8f57;
        --g-a: #2e8f57; --g-b: #6fa33c; --g-c: #d99114; --g-d: #d96a2e; --g-f: #cf4141;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #202225;
          --ink: #ececec;
          --muted: #9aa0a6;
          --hair: #34373c;
          --chipbg: #2b2e33;
          --track: #f27d7d;
          --bad: #ef7070; --warn: #e8b04a; --ok: #57c288;
          --g-a: #57c288; --g-b: #9cc45e; --g-c: #e8b04a; --g-d: #eb8a54; --g-f: #ef7070;
        }
      }
      * { box-sizing: border-box; }
      body {
        font: 13px/1.5 system-ui, sans-serif;
        background: var(--bg); color: var(--ink);
        width: 360px; margin: 0;
      }
      .g-A { color: var(--g-a); } .g-B { color: var(--g-b); } .g-C { color: var(--g-c); }
      .g-D { color: var(--g-d); } .g-F { color: var(--g-f); } .g-none { color: var(--muted); }

      .hero { display: flex; gap: 14px; padding: 14px 16px 8px; align-items: center; }
      .shot {
        flex: 1; min-width: 0; aspect-ratio: 16 / 10;
        border-radius: 10px; border: 1px solid var(--hair); overflow: hidden;
        display: grid; place-items: center; position: relative;
        background: var(--chipbg);
      }
      .shot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top; }
      .shot .letter {
        font: 700 30px Georgia, 'Iowan Old Style', serif; color: #fff;
        width: 100%; height: 100%; display: grid; place-items: center;
      }
      .gauge { flex-shrink: 0; width: 80px; text-align: center; }
      .dial { position: relative; width: 76px; height: 76px; margin: 0 auto; }
      .dial svg { display: block; }
      .dial .trackring { fill: none; stroke: var(--hair); stroke-width: 7; }
      .dial .prog {
        fill: none; stroke: currentColor; stroke-width: 7; stroke-linecap: round;
        stroke-dasharray: 201; stroke-dashoffset: 201;
        transform: rotate(-90deg); transform-origin: center;
        transition: stroke-dashoffset 0.6s ease;
      }
      @media (prefers-reduced-motion: reduce) { .dial .prog { transition: none; } }
      .dial .num {
        position: absolute; inset: 0; display: grid; place-items: center;
        font-weight: 700; font-size: 21px; color: var(--ink);
      }
      .gword { font-size: 11px; font-weight: 650; margin-top: 3px; }

      .siteline {
        padding: 0 16px 8px; color: var(--muted); font-size: 12px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .siteline b { color: var(--ink); font-size: 13px; }
      .verdict { padding: 0 16px 10px; }
      .who { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
      .who:empty { display: none; }
      .pill {
        display: flex; align-items: center; gap: 6px;
        background: var(--chipbg); border-radius: 99px;
        padding: 3px 10px 3px 4px; font-size: 12px; font-weight: 550;
      }
      .mono {
        width: 20px; height: 20px; border-radius: 50%;
        display: grid; place-items: center;
        font-size: 11px; font-weight: 700; color: #fff;
      }
      .more { color: var(--muted); align-self: center; font-size: 12px; padding-left: 2px; }

      .story { border-top: 1px solid var(--hair); padding: 10px 16px; display: grid; gap: 9px; }
      .story:empty { display: none; }
      .item { display: flex; gap: 10px; align-items: flex-start; }
      .ico {
        width: 26px; height: 26px; flex-shrink: 0; border-radius: 8px;
        display: grid; place-items: center;
        background: color-mix(in srgb, currentColor 13%, transparent);
      }
      .ico svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .ico-b { color: var(--bad); } .ico-w { color: var(--warn); } .ico-g { color: var(--ok); }
      .item .txt { padding-top: 2px; }
      .item b { font-weight: 650; }
      .item .note { color: var(--muted); font-size: 12px; }

      details { border-top: 1px solid var(--hair); }
      summary {
        list-style: none; cursor: pointer;
        padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted);
        display: flex; justify-content: space-between; align-items: center;
      }
      summary::-webkit-details-marker { display: none; }
      summary::after { content: '▾'; }
      details[open] summary::after { content: '▴'; }
      .list { max-height: 300px; overflow-y: auto; padding-bottom: 6px; }
      .sec {
        padding: 9px 16px 3px;
        font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--muted);
      }
      .row { display: flex; align-items: baseline; gap: 7px; padding: 4px 16px; }
      .host { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .chip { font-size: 11px; color: var(--muted); white-space: nowrap; }
      .chip.hot { color: var(--track); font-weight: 600; }
      .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; }
      .empty { padding: 6px 16px 16px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="shot" id="shot"></div>
      <div class="gauge g-none" id="gauge">
        <div class="dial">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle class="trackring" cx="38" cy="38" r="32" />
            <circle class="prog" id="prog" cx="38" cy="38" r="32" />
          </svg>
          <div class="num" id="score">·</div>
        </div>
        <div class="gword" id="gword"></div>
      </div>
    </div>
    <div class="siteline" id="siteline"></div>
    <div class="verdict" id="verdict"></div>
    <div class="who" id="who"></div>
    <div class="story" id="story"></div>
    <details id="details" hidden>
      <summary>Full technical list</summary>
      <div class="list" id="list"></div>
    </details>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
