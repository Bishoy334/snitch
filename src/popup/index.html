<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Privacy Inspector</title>
    <style>
      :root {
        --bg: #ffffff;
        --ink: #1b1e22;
        --muted: #6b7280;
        --hair: #ebebeb;
        --chipbg: #f3f4f6;
        --focus: #4c8dff;
        --bad: #cf4141; --warn: #d99114; --ok: #2e8f57;
        --g-a: #2e8f57; --g-b: #6fa33c; --g-c: #d99114; --g-d: #d96a2e; --g-f: #cf4141;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #202225;
          --ink: #ececec;
          --muted: #9aa0a6;
          --hair: #34373c;
          --chipbg: #2b2e33;
          --focus: #7aa7ff;
          --bad: #ef7070; --warn: #e8b04a; --ok: #57c288;
          --g-a: #57c288; --g-b: #9cc45e; --g-c: #e8b04a; --g-d: #eb8a54; --g-f: #ef7070;
        }
      }
      * { box-sizing: border-box; }
      /* one scroller: the popup viewport itself; no nested scroll areas */
      html { scrollbar-width: thin; scrollbar-color: var(--hair) transparent; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 99px; border: 2px solid var(--bg); }
      body {
        font: 13px/1.5 system-ui, sans-serif;
        background: var(--bg); color: var(--ink);
        width: 360px; margin: 0;
        user-select: none;
      }
      .verdict, .story, .list { user-select: text; }
      :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 6px; }
      /* Chrome marks a clicked <summary> as :focus-visible; no ring on disclosure rows */
      summary:focus { outline: none; }
      ::selection { background: color-mix(in srgb, var(--focus) 28%, transparent); }

      .g-A { color: var(--g-a); } .g-B { color: var(--g-b); } .g-C { color: var(--g-c); }
      .g-D { color: var(--g-d); } .g-F { color: var(--g-f); } .g-none { color: var(--muted); }

      /* hero */
      .hero { display: flex; gap: 12px; align-items: center; padding: 16px 16px 8px; }
      .fav {
        width: 40px; height: 40px; flex-shrink: 0;
        border-radius: 10px; border: 1px solid var(--hair); background: var(--chipbg);
        display: grid; place-items: center; overflow: hidden;
      }
      .fav img { width: 24px; height: 24px; border-radius: 5px; }
      .fav .letter {
        width: 100%; height: 100%; display: grid; place-items: center;
        font: 650 18px Georgia, 'Iowan Old Style', serif; color: #fff;
      }
      .head { flex: 1; min-width: 0; }
      .site { font-weight: 650; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .stat { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .gauge { flex-shrink: 0; width: 72px; text-align: center; }
      .dial { position: relative; width: 64px; height: 64px; margin: 0 auto; }
      .dial .trackring { fill: none; stroke: var(--hair); stroke-width: 6; }
      .dial .prog {
        fill: none; stroke: currentColor; stroke-width: 6; stroke-linecap: round;
        stroke-dasharray: 170; stroke-dashoffset: 170;
        transform: rotate(-90deg); transform-origin: center;
        transition: stroke-dashoffset 0.6s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        .dial .prog, summary::after, .card summary::before { transition: none !important; }
      }
      .dial .num {
        position: absolute; inset: 0; display: grid; place-items: center;
        font-weight: 700; font-size: 19px; color: var(--ink);
      }
      .gword { font-size: 11px; font-weight: 650; margin-top: 2px; }

      button:disabled { opacity: 0.6; cursor: default; }
      .switchrow {
        display: flex; align-items: center; gap: 9px;
        font-weight: 600; font-size: 13px; cursor: pointer; user-select: none;
        width: fit-content;
      }
      .switchrow input {
        appearance: none; margin: 0; cursor: pointer;
        width: 34px; height: 20px; border-radius: 99px;
        background: var(--chipbg); border: 1px solid var(--hair);
        position: relative; transition: background 0.15s ease;
      }
      .switchrow input::after {
        content: ''; position: absolute; top: 2px; left: 2px;
        width: 14px; height: 14px; border-radius: 50%;
        background: var(--muted); transition: left 0.15s ease, background 0.15s ease;
      }
      .switchrow input:checked { background: color-mix(in srgb, var(--ok) 25%, transparent); border-color: var(--ok); }
      .switchrow input:checked::after { left: 16px; background: var(--ok); }
      .verdict { padding: 2px 16px 10px; font-size: 15px; line-height: 1.4; }
      .verdict b { font-weight: 650; }
      #cta { padding: 0 16px 12px; }
      #cta:empty { display: none; }
      button {
        font: 600 13px system-ui, sans-serif;
        border-radius: 8px; padding: 8px 14px; cursor: pointer;
        border: 1px solid var(--hair); background: var(--ink); color: var(--bg);
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.85; }

      .who { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
      .who:empty { display: none; }
      .pill {
        display: flex; align-items: center; gap: 6px;
        background: var(--chipbg); border-radius: 99px;
        padding: 3px 10px 3px 4px; font-size: 12px; font-weight: 550;
      }
      .mono {
        width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
        display: grid; place-items: center;
        font-size: 11px; font-weight: 700; color: #fff;
      }
      .mono-img { background: #fff; object-fit: contain; padding: 2px; }
      .more { color: var(--muted); align-self: center; font-size: 12px; padding-left: 2px; }

      /* story */
      .story { border-top: 1px solid var(--hair); padding: 12px 16px; display: grid; gap: 10px; }
      .story:empty { display: none; }
      .item { display: flex; gap: 10px; align-items: flex-start; position: relative; }
      .ico {
        width: 26px; height: 26px; flex-shrink: 0; border-radius: 8px;
        display: grid; place-items: center;
        background: color-mix(in srgb, currentColor 13%, transparent);
      }
      .ico svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .ico-b { color: var(--bad); } .ico-w { color: var(--warn); } .ico-g { color: var(--ok); }
      .item .txt { padding-top: 2px; }
      .item b { font-weight: 650; }
      .item .note { color: var(--muted); font-size: 12px; }
      .info {
        display: inline-grid; place-items: center;
        width: 13px; height: 13px; margin-left: 6px; padding: 0;
        border: 1px solid var(--muted); border-radius: 50%;
        background: none; color: var(--muted);
        font: 600 10px/1 -apple-system, system-ui, sans-serif;
        vertical-align: 1px; cursor: pointer; opacity: 0.65;
        transition: opacity 0.15s ease;
      }
      .info:hover, .info:focus-visible { opacity: 1; }
      .tipcard {
        display: none; position: absolute; z-index: 6;
        left: 36px; right: 4px; top: 26px;
        background: var(--chipbg); border: 1px solid var(--hair); border-radius: 10px;
        padding: 9px 12px; font-size: 12px; font-weight: 400; color: var(--ink);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      }
      .item:has(.info:hover) .tipcard,
      .item:has(.info:focus-visible) .tipcard,
      .tipcard.on { display: block; }

      /* details */
      details.main { border-top: 1px solid var(--hair); }
      summary {
        list-style: none; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
        transition: background 0.15s ease;
      }
      summary::-webkit-details-marker { display: none; }
      summary:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
      details.main > summary {
        padding: 11px 16px; font-size: 12px; font-weight: 600; color: var(--muted);
      }
      details.main > summary::after {
        content: '▾'; display: inline-block; transition: transform 0.15s ease;
      }
      details.main[open] > summary::after { transform: rotate(180deg); }

      .list { padding-bottom: 8px; }

      .row {
        display: flex; align-items: baseline; gap: 7px;
        padding: 5px 16px; border-radius: 4px;
        transition: background 0.15s ease;
      }
      .row:hover { background: color-mix(in srgb, var(--ink) 4%, transparent); }
      .host { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; }
      .chip { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 4; }
      .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }

      /* actor cards */
      .card > summary { display: block; padding: 7px 16px; }
      .card .chead { display: flex; align-items: center; gap: 8px; }
      .card .csub { color: var(--muted); font-size: 11.5px; margin: 1px 0 0 28px; }
      .card .cname { font-weight: 650; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .card .cname { flex-shrink: 0; max-width: 55%; }
      .card .ccat { font-size: 11px; color: var(--muted); white-space: nowrap; display: flex; align-items: center; gap: 4px; overflow: hidden; flex-shrink: 4; }
      .card .creq { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .card .hosts { padding: 0 0 4px; }
      .card .hosts .row { padding-left: 44px; color: var(--muted); font-size: 12px; }

      .fact { color: var(--muted); font-size: 12.5px; padding: 8px 16px 4px; }
      .fact.good { color: var(--ok); }

      .empty { padding: 6px 16px 16px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="fav" id="fav"></div>
      <div class="head">
        <div class="site" id="site"></div>
        <div class="stat" id="stat"></div>
      </div>
      <div class="gauge g-none" id="gauge">
        <div class="dial">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="trackring" cx="32" cy="32" r="27" />
            <circle class="prog" id="prog" cx="32" cy="32" r="27" />
          </svg>
          <div class="num" id="score">·</div>
        </div>
        <div class="gword" id="gword"></div>
      </div>
    </div>
    <div class="verdict" id="verdict"></div>
    <div class="who" id="who"></div>
    <div id="cta"></div>
    <div class="story" id="story"></div>
    <details class="main" id="details" hidden>
      <summary>Where your data goes</summary>
      <div class="list" id="list"></div>
    </details>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
